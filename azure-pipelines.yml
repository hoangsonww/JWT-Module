trigger:
  branches:
    include:
      - main
      - master
  paths:
    exclude:
      - "*.md"
      - .claude

pr:
  branches:
    include:
      - main
      - master

variables:
  nodeVersion: "20.x"
  dockerRegistry: "$(DOCKER_REGISTRY)"
  imageName: "jwt-module"
  imageTag: "$(Build.BuildId)"

pool:
  vmImage: ubuntu-latest

stages:
  # Stage 1: Validate
  - stage: Validate
    displayName: "Validate"
    jobs:
      - job: Lint_and_Build
        displayName: "Lint & Build"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: "Install Node.js $(nodeVersion)"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run build
            displayName: "Build TypeScript"

      - job: Test
        displayName: "Test"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: "Install Node.js $(nodeVersion)"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run test:coverage
            displayName: "Run tests with coverage"
            env:
              JWT_ACCESS_SECRET: test-access-secret
              JWT_REFRESH_SECRET: test-refresh-secret

          - task: PublishTestResults@2
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "**/junit.xml"
              mergeTestResults: true
            displayName: "Publish test results"
            condition: succeededOrFailed()

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: "$(System.DefaultWorkingDirectory)/coverage/cobertura-coverage.xml"
            displayName: "Publish code coverage"
            condition: succeededOrFailed()

      - job: Security_Scan
        displayName: "Security Scan"
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)
            displayName: "Install Node.js $(nodeVersion)"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm audit --audit-level=high
            displayName: "Run npm audit"
            continueOnError: true

  # Stage 2: Build Docker Image
  - stage: Build_Image
    displayName: "Build Docker Image"
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Build_and_Push
        displayName: "Build & Push Image"
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: $(dockerRegistry)
              repository: $(imageName)
              command: buildAndPush
              Dockerfile: "$(Build.SourcesDirectory)/Dockerfile"
              tags: |
                $(imageTag)
                latest
            displayName: "Build and push Docker image"

  # Stage 3: Deploy to Staging
  - stage: Deploy_Staging
    displayName: "Deploy to Staging"
    dependsOn: Build_Image
    condition: succeeded()
    jobs:
      - deployment: Deploy
        displayName: "Deploy to Staging"
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Deploying $(imageName):$(imageTag) to staging..."
                    # TODO: Replace with actual deployment commands
                    # e.g., kubectl set image deployment/jwt-module jwt-module=$(dockerRegistry)/$(imageName):$(imageTag)
                    echo "Deployment to staging complete."
                  displayName: "Deploy to staging environment"

  # Stage 4: Deploy to Production
  - stage: Deploy_Production
    displayName: "Deploy to Production"
    dependsOn: Deploy_Staging
    condition: succeeded()
    jobs:
      - deployment: Deploy
        displayName: "Deploy to Production"
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Deploying $(imageName):$(imageTag) to production..."
                    # TODO: Replace with actual deployment commands
                    # e.g., kubectl set image deployment/jwt-module jwt-module=$(dockerRegistry)/$(imageName):$(imageTag)
                    echo "Deployment to production complete."
                  displayName: "Deploy to production environment"
