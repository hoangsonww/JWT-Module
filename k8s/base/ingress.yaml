apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jwt-module
  namespace: jwt-module
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization"
    nginx.ingress.kubernetes.io/proxy-body-size: "10k"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - jwt-module.example.com
      secretName: jwt-module-tls
  rules:
    - host: jwt-module.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jwt-module
                port:
                  number: 80
